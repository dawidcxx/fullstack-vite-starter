name: the_application_name
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: the_application_name
      POSTGRES_PASSWORD: the_application_name
      POSTGRES_DB: the_application_name
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U the_application_name -d the_application_name"]
      interval: 2s
      timeout: 5s
      retries: 5
    ports:
      - "6661:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: flat
    ports:
      - "6664:8080"
    depends_on:
      - db

  app:
    image: the_application_name:local
    profiles:
      - full
    environment:
      POSTGRES_URL: postgresql://the_application_name:the_application_name@db:5432/the_application_name
      PORT:
    ports:
      - "6663:8080"
    depends_on:
      - db

volumes:
  postgres_data: