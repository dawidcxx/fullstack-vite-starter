name: the_application_name
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: the_application_name
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d the_application_name"]
      interval: 2s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: flat
    ports:
      - "6664:8080"
    depends_on:
      - db

  app:
    image: the_application_name:local
    profiles:
      - full
    environment:
      POSTGRES_URL: postgresql://app:app@db:5432/the_application_name
    ports:
      - "6663:7001"
    depends_on:
      - db

volumes:
  postgres_data: