name: Build Image CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "packages/backend/src/**"
      - "packages/backend/build.ts"
      - "packages/common/src/**"
      - "packages/web/src/**"
      - "packages/web/*.html"
      - "packages/backend/package.json"
      - "packages/common/package.json"
      - "packages/web/package.json"
      - ".github/workflows/build-image.yml"
      - "docker/Dockerfile"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./docker/Dockerfile
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Delete old untagged images from GHCR
        uses: ./.github/actions/delete-untagged-images
        with:
          owner: ${{ github.repository_owner }}
          package: ${{ env.IMAGE_NAME }}
          password: ${{ secrets.GITHUB_TOKEN }}